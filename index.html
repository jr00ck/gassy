<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Gassy</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#FF6B35">

<!-- iOS home screen support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gassy">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ptr-indicator" class="ptr-indicator"><div class="ptr-spinner"></div></div>

<div id="app-content">

<header class="topbar">
  <div class="topbar-row">
    <h1>⛽ Gassy</h1>
    <button type="button" id="updated-badge" class="updated-badge" hidden>✓ Updated</button>
  </div>
  <div id="whats-new" class="whats-new" hidden></div>
</header>

<main>
  <form id="entry-form" class="card">
    <div id="edit-banner" class="edit-banner" hidden>
      <span id="edit-banner-text">Editing fill-up</span>
      <button type="button" id="cancel-edit-btn" class="link-btn">Cancel</button>
    </div>

    <div class="field">
      <div class="field-label-row">
        <label for="datetime">Date &amp; time</label>
        <button type="button" id="import-photo-btn" class="icon-btn" title="Fill date &amp; location from a photo" aria-label="Fill from photo">📷</button>
        <input type="file" id="photo-input" accept="image/*" hidden>
      </div>
      <input type="datetime-local" id="datetime" name="datetime" required>
      <p id="photo-status" class="hint" hidden></p>
    </div>

    <div class="field">
      <label for="mileage">Mileage (odometer)</label>
      <input type="number" id="mileage" name="mileage" inputmode="decimal" step="0.1" min="0" placeholder="e.g. 45210" required>
    </div>

    <div class="row">
      <div class="field">
        <label for="pricePerGallon">Price / gallon</label>
        <input type="text" id="pricePerGallon" name="pricePerGallon" inputmode="numeric" placeholder="3.499" required>
      </div>

      <div class="field">
        <label for="totalCost">Total cost</label>
        <input type="text" id="totalCost" name="totalCost" inputmode="numeric" placeholder="42.50" required>
      </div>
    </div>

    <div class="field">
      <label for="location">Location</label>
      <div class="location-row">
        <input type="text" id="location" name="location" placeholder="Locating…">
        <button type="button" id="locate-btn" title="Refresh current location" aria-label="Refresh current location">📍</button>
      </div>
      <p id="location-status" class="hint"></p>
      <p id="location-address" class="hint"></p>
      <div id="nearby-stations" class="nearby-stations" hidden></div>
      <div id="missing-data-notice" class="missing-notice" hidden></div>
    </div>

    <button type="submit" class="primary-btn" id="submit-btn">Add fill-up</button>
    <button type="button" id="delete-entry-btn" class="delete-link-btn" hidden>Delete this fill-up</button>
  </form>

  <section class="log-section">
    <div class="log-header">
      <h2>Log</h2>
      <button type="button" id="export-btn" class="link-btn">Export CSV</button>
    </div>
    <ul id="entries-list" class="entries"></ul>
    <p id="empty-state" class="hint">No fill-ups logged yet.</p>
  </section>

  <footer class="app-footer">
    <span class="app-footer-version" id="app-version"></span>
  </footer>
</main>

</div>

<script src="app.js"></script>
</body>
</html>
